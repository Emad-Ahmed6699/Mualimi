<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - معلمي</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        }
        .login-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }
        .role-card {
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .role-card:hover {
            border-color: var(--primary-color);
            background-color: #f0f7ff;
        }
        .role-icon {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 15px;
        }
    </style>
</head>
<body class="fade-in">

    <div class="login-container">
        <div class="text-center mb-5">
            <h1 class="fw-bold text-primary">معلمي</h1>
            <p class="text-muted">نظام الإدارة الأكاديمية والتقييم المتكامل</p>
        </div>

        <div class="card m-card p-4">
            <h4 class="text-center mb-4">اختر نوع الحساب</h4>
            
            <div class="row g-3">
                <div class="col-6">
                    <div class="card role-card p-4 text-center h-100" onclick="selectRole('teacher')" role="button" tabindex="0">
                        <i class="fas fa-chalkboard-teacher role-icon"></i>
                        <h6 class="fw-bold">دخول المعلم</h6>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card role-card p-4 text-center h-100" onclick="selectRole('student')" role="button" tabindex="0">
                        <i class="fas fa-user-graduate role-icon"></i>
                        <h6 class="fw-bold">دخول الطالب</h6>
                    </div>
                </div>
            </div>

            <div class="mt-4 text-center">
                <small class="text-muted">نظام ذكي لبيئة تعليمية أفضل</small>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // Ensure selectRole is available immediately
        if (!window.selectRole) {
            window.selectRole = (role) => {
                console.log('Selecting role:', role);
                localStorage.setItem('mualimi_role', role);
                if (role === 'teacher') {
                    window.location.href = 'teacher-dashboard.html';
                } else {
                    window.location.href = 'student-dashboard.html';
                }
            };
        }
    </script>

</body>
</html>
