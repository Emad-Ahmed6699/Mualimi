<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتائجي - معلمي</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        body { padding-bottom: 80px; }
        .student-header {
            background-color: #fff;
            padding: 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .grade-item {
            background: #fff;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 5px solid var(--primary-color);
        }
    </style>
</head>
<body class="fade-in">

    <header class="student-header">
        <div class="d-flex align-items-center mb-2">
            <a href="../../student-dashboard.html" class="text-dark me-3" title="العودة للرئيسة"><i class="fas fa-arrow-right"></i></a>
            <h4 class="fw-bold mb-0">نتائجي وتقدمي</h4>
        </div>
        <p class="text-muted small mb-0">عرض درجات الاختبارات السابقة</p>
    </header>

    <div class="container">
        <div class="card m-card p-4 mb-4 bg-primary text-white text-center">
            <p class="mb-1">المعدل التراكمي</p>
            <h1 class="fw-bold">94%</h1>
            <span class="badge bg-white text-primary">تقدير: ممتاز</span>
        </div>

        <h6 class="fw-bold mb-3">تفاصيل الدرجات</h6>
        
        <div class="grade-item">
            <div>
                <h6 class="mb-0 fw-bold">اختبار النحو والشعر</h6>
                <small class="text-muted">بتاريخ 2024/04/20</small>
            </div>
            <div class="text-end">
                <h5 class="fw-bold text-primary mb-0">19/20</h5>
            </div>
        </div>

        <div class="grade-item border-success-custom">
            <div>
                <h6 class="mb-0 fw-bold">اختبار النصوص الأدبية</h6>
                <small class="text-muted">بتاريخ 2024/04/15</small>
            </div>
            <div class="text-end">
                <h5 class="fw-bold text-success mb-0">15/15</h5>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="../../student-dashboard.html" class="nav-item">
            <i class="fas fa-home"></i>
            الرئيسة
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-book"></i>
            الاختبارات
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-comment-alt"></i>
            الرسائل
        </a>
        <a href="../../index.html" class="nav-item text-danger">
            <i class="fas fa-sign-out-alt"></i>
            خروج
        </a>
    </nav>

    <script src="../../assets/js/main.js"></script>
</body>
</html>
