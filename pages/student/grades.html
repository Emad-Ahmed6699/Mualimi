<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتائجي وتقدمي - معلمي</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        body { padding-bottom: 80px; }
        .grade-card {
            border: none;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-right: 5px solid var(--primary-color);
        }
        .score-badge {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #f0f7ff;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body class="bg-light fade-in">

    <header class="bg-white p-4 mb-4 shadow-sm">
        <div class="container d-flex align-items-center">
            <a href="dashboard.html" class="text-dark me-3" aria-label="العودة للوحة التحكم"><i class="fas fa-arrow-right"></i></a>
            <h4 class="fw-bold mb-0">نتائجي وتقدمي</h4>
        </div>
    </header>

    <div class="container">
        <div id="grades-container">
            <!-- Grades will be loaded here -->
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-home"></i>
            الرئيسة
        </a>
        <a href="quizzes.html" class="nav-item">
            <i class="fas fa-book"></i>
            الاختبارات
        </a>
        <a href="#" class="nav-item active">
            <i class="fas fa-award"></i>
            نتائجي
        </a>
        <a href="../../index.html" class="nav-item text-danger">
            <i class="fas fa-sign-out-alt"></i>
            خروج
        </a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const studentId = localStorage.getItem('mualimi_student_id');
            const container = document.getElementById('grades-container');

            if (!studentId) {
                container.innerHTML = `
                    <div class="card p-5 text-center rounded-4 border-0 shadow-sm">
                        <i class="fas fa-user-slash mb-3 text-muted" style="font-size: 3rem;"></i>
                        <h5 class="fw-bold">لم يتم العثور على بياناتك</h5>
                        <p class="text-muted">يرجى تسجيل الدخول أو حل اختبار أولاً لتظهر نتائجك هنا.</p>
                        <a href="quizzes.html" class="btn btn-primary rounded-pill px-4">اذهب للاختبارات</a>
                    </div>
                `;
                return;
            }

            try {
                // We need an endpoint to get student submissions
                // Let's assume we can get it via a new API method
                const response = await api.request(`/grades/student/${studentId}`);
                const submissions = response.data || [];
                
                container.innerHTML = '';
                
                if (submissions.length === 0) {
                    container.innerHTML = '<div class="text-center py-5 text-muted"><p>لا توجد نتائج مسجلة لك حتى الآن</p></div>';
                    return;
                }

                submissions.forEach(sub => {
                    const card = document.createElement('div');
                    card.className = 'grade-card fade-in';
                    const percentage = (sub.score / sub.totalPoints) * 100;
                    const statusClass = percentage >= 50 ? 'text-success' : 'text-danger';
                    
                    card.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="fw-bold mb-1">${sub.quiz ? sub.quiz.title : 'اختبار'}</h6>
                                <p class="small text-muted mb-0"><i class="fas fa-calendar-alt me-1"></i> ${new Date(sub.submittedAt).toLocaleDateString('ar-EG')}</p>
                            </div>
                            <div class="d-flex align-items-center">
                                <div class="me-3 text-end">
                                    <div class="fw-bold ${statusClass}">${sub.score} / ${sub.totalPoints}</div>
                                    <small class="text-muted">${percentage.toFixed(0)}%</small>
                                </div>
                                <div class="score-badge">
                                    ${percentage.toFixed(0)}%
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                container.innerHTML = '<div class="alert alert-danger">حدث خطأ أثناء تحميل النتائج</div>';
            }
        });
    </script>
</body>
</html>
