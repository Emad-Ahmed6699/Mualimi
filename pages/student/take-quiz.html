<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حل الاختبار - معلمي</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .quiz-header {
            background-color: #fff;
            padding: 20px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .question-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            padding: 25px;
        }
        .option-item {
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }
        .option-item:hover {
            border-color: var(--primary-color);
            background-color: #f8fbff;
        }
        .option-item.selected {
            border-color: var(--primary-color);
            background-color: #eef7ff;
            font-weight: bold;
        }
        .option-radio {
            display: none;
        }
        .timer-badge {
            background-color: #fef2f2;
            color: #ef4444;
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: bold;
        }
        #submit-quiz-btn {
            display: none;
        }
        .success-icon {
            font-size: 5rem;
        }
    </style>
</head>
<body class="bg-light">

    <header class="quiz-header">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <h5 class="fw-bold mb-0" id="quiz-title-display">جاري تحميل الاختبار...</h5>
                <small class="text-muted" id="quiz-group-display">المجموعة: --</small>
            </div>
            <div class="timer-badge">
                <i class="fas fa-clock me-1"></i>
                <span id="quiz-timer">--:--</span>
            </div>
        </div>
    </header>

    <!-- Warning Alert -->
    <div class="alert alert-warning alert-dismissible fade show mx-3 mt-3" role="alert" id="quiz-warning-alert">
        <div class="d-flex align-items-start">
            <i class="fas fa-exclamation-triangle me-3 flex-shrink-0 mt-1"></i>
            <div>
                <strong>⚠️ تحذير مهم:</strong> لا تغادر هذه الصفحة أثناء الامتحان. إذا حاولت المغادرة أو تبديل نافذة المتصفح، سيتم إنهاء الامتحان تلقائياً وتسجيل محاولة الغش.
            </div>
        </div>
    </div>

    <div class="container mt-4 pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8" id="questions-container">
                <!-- Questions will be injected here -->
            </div>
            
            <div class="col-lg-8 text-center mt-4">
                <button class="btn btn-primary btn-lg rounded-pill px-5 shadow" id="submit-quiz-btn">
                    إنهاء وإرسال الإجابات
                </button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal fade" id="resultModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-body text-center p-5">
                    <div class="mb-4">
                        <i class="fas fa-check-circle text-success success-icon"></i>
                    </div>
                    <h3 class="fw-bold mb-3">تم إرسال إجابتك!</h3>
                    <p class="text-muted mb-4">لقد انتهيت من حل الاختبار بنجاح. سيتم مراجعة الدرجات قريباً.</p>
                    <button class="btn btn-primary w-100 rounded-pill" onclick="window.location.href='dashboard.html'">
                        العودة للرئيسة
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/main.js"></script>
    <script>
        // Anti-cheating system
        let cheatingData = {
            tabSwitchAttempts: 0,
            windowBlurAttempts: 0,
            warnings: [],
            suspiciousActivity: [],
            warningStartTime: null,
            isWarning: false
        };
        
        let quizState = {
            isActive: false,
            quizId: null,
            studentId: null,
            timerInterval: null,
            timeRemaining: 0,
            startTime: null,
            autoSubmitTimer: null
        };

        // Specific logic for take-quiz page
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const quizId = urlParams.get('id');
            const studentId = localStorage.getItem('mualimi_student_id');
            
            if (!quizId || !studentId) {
                alert('عذراً، حدث خطأ في البيانات. سيتم توجيهك للرئيسة.');
                window.location.href = 'dashboard.html';
                return;
            }

            quizState.quizId = quizId;
            quizState.studentId = studentId;

            try {
                // Check if student already taken this quiz
                const gradesRes = await api.getStudentGrades(studentId);
                const hasTaken = (gradesRes.data || []).some(g => g.quiz && g.quiz._id === quizId);
                
                if (hasTaken) {
                    alert('لقد قمت بحل هذا الاختبار مسبقاً!');
                    window.location.href = 'dashboard.html';
                    return;
                }

                const response = await api.getQuiz(quizId);
                const quiz = response.data;
                
                document.getElementById('quiz-title-display').textContent = quiz.title;
                document.getElementById('quiz-group-display').textContent = `المجموعة: ${quiz.group ? quiz.group.name : 'عام'}`;
                
                renderQuizQuestions(quiz.questions);
                startTimer(quiz.duration || 30);
                
                document.getElementById('submit-quiz-btn').style.display = 'inline-block';
                document.getElementById('submit-quiz-btn').onclick = () => submitQuiz(quizId, studentId);
                
                // Enable anti-cheating system
                quizState.isActive = true;
                initAntiCheatSystem();
                
            } catch (error) {
                console.error(error);
                showNotification('خطأ في تحميل الاختبار', 'error');
            }
        });

        function initAntiCheatSystem() {
            // Detect tab/window switching
            document.addEventListener('visibilitychange', handleVisibilityChange);
            
            // Detect window blur (user leaving window)
            window.addEventListener('blur', handleWindowBlur);
            window.addEventListener('focus', handleWindowFocus);
            
            // Prevent keyboard shortcuts (Ctrl+C, Ctrl+V, F12, etc)
            document.addEventListener('keydown', preventCheatKeybinds);
            
            // Prevent right-click
            document.addEventListener('contextmenu', preventRightClick);
            
            // Detect page unload/refresh
            window.addEventListener('beforeunload', handleBeforeUnload);
        }

        function handleVisibilityChange() {
            if (!quizState.isActive) return;
            
            if (document.hidden) {
                // Tab switched away
                cheatingData.tabSwitchAttempts++;
                cheatingData.suspiciousActivity.push({
                    type: 'tab_switch',
                    timestamp: new Date(),
                    attempt: cheatingData.tabSwitchAttempts
                });
                showCheatingWarning('⚠️ تحذير: لا يُسمح بمغادرة الامتحان أثناء حله!');
                startCheatingCountdown();
            }
        }

        function handleWindowBlur() {
            if (!quizState.isActive) return;
            
            cheatingData.windowBlurAttempts++;
            cheatingData.suspiciousActivity.push({
                type: 'window_blur',
                timestamp: new Date(),
                attempt: cheatingData.windowBlurAttempts
            });
            showCheatingWarning('⚠️ تحذير: يجب أن تركز على الامتحان!');
            startCheatingCountdown();
        }

        function handleWindowFocus() {
            if (!quizState.isActive) return;
            // User returned to window - can extend warning
        }

        function startCheatingCountdown() {
            if (cheatingData.isWarning) return; // Already in warning
            
            cheatingData.isWarning = true;
            cheatingData.warningStartTime = Date.now();
            let remainingSeconds = 10;

            const warningInterval = setInterval(() => {
                if (!quizState.isActive) {
                    clearInterval(warningInterval);
                    return;
                }

                const elapsed = Math.floor((Date.now() - cheatingData.warningStartTime) / 1000);
                remainingSeconds = 10 - elapsed;

                if (remainingSeconds <= 0) {
                    clearInterval(warningInterval);
                    endQuizDueToCheating();
                } else {
                    updateWarningDisplay(remainingSeconds);
                }
            }, 100);
        }

        function showCheatingWarning(message) {
            const existingWarning = document.getElementById('cheating-warning');
            if (existingWarning) {
                existingWarning.remove();
            }

            const warning = document.createElement('div');
            warning.id = 'cheating-warning';
            warning.className = 'alert alert-danger alert-dismissible fade show shadow-lg';
            warning.style.cssText = `
                position: fixed;
                top: 80px;
                left: 20px;
                right: 20px;
                z-index: 9999;
                max-width: 500px;
                animation: slideIn 0.3s ease-out;
            `;
            warning.innerHTML = `
                <div class="d-flex align-items-center">
                    <i class="fas fa-exclamation-triangle me-2" style="font-size: 1.5rem;"></i>
                    <div>
                        <strong>${message}</strong>
                        <div class="small mt-2">سيتم إغلاق الامتحان في: <span id="warning-countdown">10</span> ثواني</div>
                    </div>
                </div>
            `;
            document.body.insertBefore(warning, document.body.firstChild);

            setTimeout(() => {
                if (warning.parentElement) warning.remove();
            }, 10000);
        }

        function updateWarningDisplay(seconds) {
            const countdownEl = document.getElementById('warning-countdown');
            if (countdownEl) {
                countdownEl.textContent = seconds;
            }
        }

        function endQuizDueToCheating() {
            if (!quizState.isActive) return;
            
            quizState.isActive = false;
            cheatingData.isWarning = false;
            
            showNotification('❌ تم إغلاق الامتحان بسبب محاولة الغش!', 'error');
            
            // Mark as cheating and submit automatically
            submitQuizWithCheatingFlag();
        }

        function preventCheatKeybinds(e) {
            if (!quizState.isActive) return;
            
            // Ctrl+C, Ctrl+X, Ctrl+V, F12, Ctrl+Shift+I, Ctrl+Shift+J
            if (
                (e.ctrlKey && (e.key === 'c' || e.key === 'x' || e.key === 'v')) ||
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j'))
            ) {
                e.preventDefault();
                cheatingData.suspiciousActivity.push({
                    type: 'prohibited_key',
                    key: e.key,
                    timestamp: new Date()
                });
                showNotification('⚠️ هذا الإجراء غير مسموح به!', 'warning');
            }
        }

        function preventRightClick(e) {
            if (!quizState.isActive) return;
            e.preventDefault();
            cheatingData.suspiciousActivity.push({
                type: 'right_click',
                timestamp: new Date()
            });
        }

        function handleBeforeUnload(e) {
            if (!quizState.isActive) return;
            
            // Record the cheating attempt
            cheatingData.cheatingFlags = true;
            cheatingData.windowBlurAttempts++;
            cheatingData.cheatingDetails = 'محاولة مغادرة الامتحان أو إغلاق الصفحة';
            cheatingData.warnings.push({
                type: 'Leave Attempt',
                timestamp: new Date()
            });
            
            e.preventDefault();
            e.returnValue = 'الامتحان جاري! هل أنت متأكد من رغبتك في المغادرة؟ سيتم تسجيل محاولة الغش!';
            return e.returnValue;
        }

        function renderQuizQuestions(questions) {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            questions.forEach((q, idx) => {
                const card = document.createElement('div');
                card.className = 'card question-card fade-in';
                card.dataset.index = idx;
                
                let optionsHtml = '';
                q.options.forEach((opt, optIdx) => {
                    optionsHtml += `
                        <div class="option-item" onclick="selectOption(this, ${idx}, '${opt}')">
                            <span class="me-3">${optIdx + 1}.</span>
                            <span>${opt}</span>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <h6 class="fw-bold mb-4">سؤال ${idx + 1}: ${q.question}</h6>
                    <div class="options-list">
                        ${optionsHtml}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.selectOption = (el, qIdx, value) => {
            const options = el.parentElement.querySelectorAll('.option-item');
            options.forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            el.parentElement.dataset.selectedValue = value;
        };

        function startTimer(minutes) {
            quizState.timeRemaining = minutes * 60;
            quizState.startTime = Date.now();
            const timerEl = document.getElementById('quiz-timer');
            
            quizState.timerInterval = setInterval(() => {
                const mins = Math.floor(quizState.timeRemaining / 60);
                const secs = quizState.timeRemaining % 60;
                timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                // Warning when time is running out (last 1 minute)
                if (quizState.timeRemaining === 60) {
                    showNotification('⏰ دقيقة واحدة متبقية!', 'info');
                }
                
                if (quizState.timeRemaining <= 0) {
                    clearInterval(quizState.timerInterval);
                    showNotification('انتهى الوقت! سيتم إرسال إجاباتك تلقائياً.', 'info');
                    quizState.isActive = false;
                    document.getElementById('submit-quiz-btn').click();
                }
                quizState.timeRemaining--;
            }, 1000);
        }

        async function submitQuiz(quizId, studentId) {
            if (quizState.timerInterval) clearInterval(quizState.timerInterval);
            quizState.isActive = false;

            const answers = [];
            document.querySelectorAll('.options-list').forEach((list, idx) => {
                answers.push({
                    questionIndex: idx,
                    selectedAnswer: list.dataset.selectedValue || ''
                });
            });

            try {
                await api.submitQuiz(quizId, {
                    studentId,
                    answers,
                    cheatingData: null // Normal submission
                });
                const modal = new bootstrap.Modal(document.getElementById('resultModal'));
                modal.show();
            } catch (error) {
                showNotification('فشل في إرسال الإجابات: ' + error.message, 'error');
            }
        }

        async function submitQuizWithCheatingFlag() {
            const answers = [];
            document.querySelectorAll('.options-list').forEach((list, idx) => {
                answers.push({
                    questionIndex: idx,
                    selectedAnswer: list.dataset.selectedValue || ''
                });
            });

            try {
                await api.submitQuiz(quizState.quizId, {
                    studentId: quizState.studentId,
                    answers,
                    cheatingData: {
                        cheatingFlags: true,
                        tabSwitchAttempts: cheatingData.tabSwitchAttempts,
                        windowBlurAttempts: cheatingData.windowBlurAttempts,
                        cheatingDetails: `محاولات الخروج: ${cheatingData.tabSwitchAttempts + cheatingData.windowBlurAttempts}`,
                        warnings: cheatingData.warnings,
                        suspiciousActivity: cheatingData.suspiciousActivity.map(a => ({
                            type: a.type,
                            timestamp: a.timestamp
                        }))
                    }
                });
                
                const modal = new bootstrap.Modal(document.getElementById('resultModal'));
                modal.innerHTML = `
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content border-0 rounded-4 shadow">
                            <div class="modal-body text-center p-5">
                                <div class="mb-4">
                                    <i class="fas fa-times-circle text-danger" style="font-size: 5rem;"></i>
                                </div>
                                <h3 class="fw-bold mb-3">❌ تم اكتشاف غش!</h3>
                                <p class="text-danger mb-4">تم إغلاق الامتحان بسبب محاولة الغش. سيتم إبلاغ المعلم بهذه الحادثة.</p>
                                <button class="btn btn-primary w-100 rounded-pill" onclick="window.location.href='dashboard.html'">
                                    العودة للرئيسة
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                modal.show();
            } catch (error) {
                showNotification('فشل في إرسال الإجابات: ' + error.message, 'error');
            }
        }

        // Add CSS animation
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
