<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - معلمي</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 0;
        }
        .signup-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 550px;
            overflow: hidden;
            border: none;
        }
        .signup-header {
            background: #fff;
            padding: 25px;
            text-align: center;
        }
        .signup-body {
            padding: 35px;
        }
        .nav-pills .nav-link {
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: 600;
            color: #666;
        }
        .nav-pills .nav-link.active {
            background-color: var(--primary-color);
        }
        .form-control {
            border-radius: 10px;
            padding: 10px 15px;
            border: 1px solid #eee;
            background: #f9f9f9;
        }
        .btn-signup {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            color: #fff;
            transition: all 0.3s;
        }
        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
            color: #fff;
        }
    </style>
</head>
<body class="fade-in">

    <div class="signup-card">
        <div class="signup-header">
            <h1 class="fw-bold text-primary mb-1">معلمي</h1>
            <p class="text-muted small">ابدأ رحلتك التعليمية الذكية اليوم</p>
        </div>
        
        <div class="signup-body">
            <ul class="nav nav-pills nav-justified mb-4" id="signup-tabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="teacher-signup-tab" data-bs-toggle="pill" data-bs-target="#teacher-signup" type="button" role="tab">معلم جديد</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="student-signup-tab" data-bs-toggle="pill" data-bs-target="#student-signup" type="button" role="tab">طالب جديد</button>
                </li>
            </ul>

            <div class="tab-content">
                <!-- Teacher Signup -->
                <div class="tab-pane fade show active" id="teacher-signup">
                    <form id="teacher-signup-form">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">الاسم بالكامل</label>
                            <input type="text" class="form-control" id="teacher-name" placeholder="اكتب اسمك هنا..." required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">البريد الإلكتروني</label>
                            <input type="email" class="form-control" id="teacher-email-reg" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">المادة العلمية</label>
                            <input type="text" class="form-control" id="teacher-subject" placeholder="مثلاً: لغة عربية" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">كلمة المرور</label>
                            <input type="password" class="form-control" id="teacher-password-reg" placeholder="لا تقل عن 6 أحرف" minlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-signup w-100">إنشاء حساب معلم</button>
                    </form>
                </div>

                <!-- Student Signup -->
                <div class="tab-pane fade" id="student-signup">
                    <form id="student-signup-form">
                        <div class="row g-3 mb-3">
                            <div class="col-md-7">
                                <label class="form-label small fw-bold">الاسم بالكامل</label>
                                <input type="text" class="form-control" id="student-name" placeholder="الاسم الرباعي..." required>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label small fw-bold">كود الطالب (ID)</label>
                                <input type="text" class="form-control" id="student-reg-id" placeholder="ID فريد" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">البريد الإلكتروني</label>
                            <input type="email" class="form-control" id="student-email-reg" placeholder="example@mail.com" required>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label small fw-bold">السن</label>
                                <input type="number" class="form-control" id="student-age" placeholder="15" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold">الصف الدراسي</label>
                                <input type="text" class="form-control" id="student-grade" placeholder="مثلاً: العاشر" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">كلمة المرور</label>
                            <input type="password" class="form-control" id="student-password-reg" placeholder="لا تقل عن 6 أحرف" minlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-signup w-100">إنشاء حساب طالب</button>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4">
                <p class="text-muted small">لديك حساب بالفعل؟ <a href="login.html" class="text-primary fw-bold text-decoration-none">تسجيل الدخول</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Handle Teacher Signup
            document.getElementById('teacher-signup-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const data = {
                    name: document.getElementById('teacher-name').value,
                    email: document.getElementById('teacher-email-reg').value,
                    subject: document.getElementById('teacher-subject').value,
                    password: document.getElementById('teacher-password-reg').value
                };

                try {
                    const response = await api.request('/auth/teacher/signup', {
                        method: 'POST',
                        body: JSON.stringify(data)
                    });
                    
                    if (response.success) {
                        showNotification('تم إنشاء الحساب بنجاح! يمكنك الآن تسجيل الدخول.');
                        setTimeout(() => window.location.href = 'login.html', 2000);
                    }
                } catch (error) {
                    showNotification(error.message, 'error');
                }
            });

            // Handle Student Signup
            document.getElementById('student-signup-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const data = {
                    name: document.getElementById('student-name').value,
                    studentId: document.getElementById('student-reg-id').value,
                    email: document.getElementById('student-email-reg').value,
                    age: document.getElementById('student-age').value,
                    grade: document.getElementById('student-grade').value,
                    password: document.getElementById('student-password-reg').value
                };

                try {
                    const response = await api.request('/auth/student/signup', {
                        method: 'POST',
                        body: JSON.stringify(data)
                    });
                    
                    if (response.success) {
                        showNotification('تم إنشاء الحساب بنجاح! يمكنك الآن تسجيل الدخول.');
                        setTimeout(() => window.location.href = 'login.html', 2000);
                    }
                } catch (error) {
                    showNotification(error.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
