<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ الاختبارات - معلمي</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="fade-in">

    <!-- Mobile Toggle Button -->
    <button class="mobile-toggle" title="تبديل القائمة">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">معلمي</h3>
            <span class="badge bg-primary">لوحة الإدارة</span>
        </div>
        <div class="nav flex-column">
            <a href="../../teacher-dashboard.html" class="nav-link"><i class="fas fa-home me-2"></i> الرئيسة</a>
            <a href="groups.html" class="nav-link"><i class="fas fa-users me-2"></i> المجموعات</a>
            <a href="quiz-creator.html" class="nav-link active"><i class="fas fa-plus-circle me-2"></i> منشئ الاختبارات</a>
            <a href="reports.html" class="nav-link"><i class="fas fa-chart-bar me-2"></i> التقارير والنتائج</a>
            <hr>
            <a href="../../index.html" class="nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i> تسجيل الخروج</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="mb-4">
            <h2 class="fw-bold">منشئ الاختبارات</h2>
            <p class="text-muted">صمم اختبارات تفاعلية لطلابك</p>
        </header>

        <div class="card m-card p-4">
            <div class="mb-4 border-bottom pb-3">
                <h5 class="fw-bold"><i class="fas fa-info-circle me-2 text-primary"></i>معلومات الاختبار</h5>
                <div class="row g-3 mt-2">
                    <div class="col-md-6">
                        <label for="quiz-title" class="form-label">عنوان الاختبار</label>
                        <input type="text" id="quiz-title" class="form-control" placeholder="مثلاً: اختبار النحو الشامل">
                    </div>
                    <div class="col-md-3">
                        <label for="target-group" class="form-label">المجموعة المستهدفة</label>
                        <select id="target-group" class="form-select">
                            <option>المجموعة أ</option>
                            <option>المجموعة ب</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="quiz-duration" class="form-label">مدة الاختبار (بالدقائق)</label>
                        <input type="number" id="quiz-duration" class="form-control" value="30">
                    </div>
                    <div class="col-md-6">
                        <label for="quiz-start" class="form-label">تاريخ البدء</label>
                        <input type="datetime-local" id="quiz-start" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label for="quiz-end" class="form-label">تاريخ الانتهاء</label>
                        <input type="datetime-local" id="quiz-end" class="form-control">
                    </div>
                </div>
            </div>

            <div id="questions-container">
                <!-- Question cards will be added here -->
            </div>

            <button id="add-question-btn" class="btn btn-outline-primary w-100 mb-4"><i class="fas fa-plus me-2"></i>إضافة سؤال جديد</button>

            <div class="d-flex justify-content-between">
                <button id="save-draft-btn" class="btn btn-secondary px-4">حفظ كمسودة</button>
                <button id="publish-quiz-btn" class="btn btn-primary px-5">نشر الاختبار الآن</button>
            </div>
        </div>
    </main>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/modules/quiz-module.js"></script>
    <script src="../../assets/js/main.js"></script>
    <script>
        let isEditing = false;
        let quizId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            quizId = urlParams.get('id');
            if (quizId) {
                isEditing = true;
                document.querySelector('header h2').textContent = 'تعديل الاختبار';
                document.getElementById('publish-quiz-btn').textContent = 'حفظ التعديلات';
            }

            // Set default dates
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            document.getElementById('quiz-start').value = now.toISOString().slice(0, 16);
            document.getElementById('quiz-end').value = tomorrow.toISOString().slice(0, 16);

            // Fetch groups
            try {
                const response = await api.getAllGroups();
                const groupSelect = document.getElementById('target-group');
                groupSelect.innerHTML = '';
                response.data.forEach(group => {
                    const option = document.createElement('option');
                    option.value = group._id;
                    option.textContent = group.name;
                    groupSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error fetching groups:', error);
            }

            // If editing, load quiz data
            if (isEditing) {
                try {
                    const response = await api.getQuiz(quizId);
                    const quiz = response.data;
                    
                    document.getElementById('quiz-title').value = quiz.title;
                    document.getElementById('target-group').value = quiz.group ? quiz.group._id : '';
                    document.getElementById('quiz-duration').value = quiz.duration || 30;
                    
                    if (quiz.startDate) document.getElementById('quiz-start').value = new Date(quiz.startDate).toISOString().slice(0, 16);
                    if (quiz.endDate) document.getElementById('quiz-end').value = new Date(quiz.endDate).toISOString().slice(0, 16);

                    // Load questions
                    const container = document.getElementById('questions-container');
                    container.innerHTML = '';
                    QuizModule.resetQuestionCount();
                    quiz.questions.forEach(q => {
                        QuizModule.addQuestion(container);
                        const lastQ = container.lastElementChild;
                        lastQ.querySelector('.q-text').value = q.question;
                        const optInputs = lastQ.querySelectorAll('.opt-val');
                        q.options.forEach((opt, idx) => {
                            if (optInputs[idx]) optInputs[idx].value = opt;
                            if (opt === q.correctAnswer) {
                                lastQ.querySelectorAll('input[type="radio"]')[idx].checked = true;
                            }
                        });
                    });
                } catch (error) {
                    showNotification('خطأ في تحميل بيانات الاختبار', 'error');
                }
            } else {
                QuizModule.resetQuestionCount();
                addQuestion();
            }

            // Setup event listeners
            document.getElementById('add-question-btn').addEventListener('click', addQuestion);
            document.getElementById('publish-quiz-btn').addEventListener('click', submitQuiz);
        });

        function addQuestion() {
            QuizModule.addQuestion(document.getElementById('questions-container'));
        }

        async function submitQuiz() {
            const btn = document.getElementById('publish-quiz-btn');
            if (btn.disabled) return; // Prevent duplicate submissions
            
            const teacherId = localStorage.getItem('mualimi_user_id') || '65ebc4d1a1b2c3d4e5f60001';
            const title = document.getElementById('quiz-title').value.trim();
            const group = document.getElementById('target-group').value;
            const startDate = document.getElementById('quiz-start').value;
            const endDate = document.getElementById('quiz-end').value;

            // Validation
            if (!title) {
                showNotification('يرجى إدخال عنوان الاختبار', 'error');
                return;
            }

            if (!group) {
                showNotification('يرجى اختيار المجموعة المستهدفة', 'error');
                return;
            }

            // Collect questions using module
            const { questions, totalPoints } = QuizModule.collectQuestions();

            if (questions.length === 0) {
                showNotification('يرجى إضافة سؤال واحد على الأقل مع كامل خياراته', 'error');
                return;
            }

            const quizData = {
                title,
                group,
                teacher: teacherId,
                questions,
                totalPoints,
                startDate,
                endDate
            };

            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>جاري الحفظ...';
                
                if (isEditing) {
                    await api.updateQuiz(quizId, quizData);
                    showNotification('تم تحديث الاختبار بنجاح!', 'success');
                } else {
                    await api.createQuiz(quizData);
                    showNotification('تم نشر الاختبار بنجاح!', 'success');
                }
                
                setTimeout(() => window.location.href = '../../teacher-dashboard.html', 1500);
            } catch (error) {
                showNotification('فشل في العملية: ' + error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = isEditing ? 'حفظ التعديلات' : 'نشر الاختبار الآن';
            }
        }
    </script>

</body>
</html>
