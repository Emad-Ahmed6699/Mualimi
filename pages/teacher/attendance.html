<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحضير الطلاب - معلمي</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="fade-in">

    <!-- Mobile Toggle Button -->
    <button class="mobile-toggle" title="تبديل القائمة">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">معلمي</h3>
            <span class="badge bg-primary">لوحة الإدارة</span>
        </div>
        <div class="nav flex-column">
            <a href="../../teacher-dashboard.html" class="nav-link"><i class="fas fa-home me-2"></i> الرئيسة</a>
            <a href="groups.html" class="nav-link"><i class="fas fa-users me-2"></i> المجموعات</a>
            <a href="attendance.html" class="nav-link active"><i class="fas fa-clipboard-check me-2"></i> الحضور والغياب</a>
            <a href="quiz-creator.html" class="nav-link"><i class="fas fa-plus-circle me-2"></i> منشئ الاختبارات</a>
            <a href="reports.html" class="nav-link"><i class="fas fa-chart-bar me-2"></i> التقارير والنتائج</a>
            <hr>
            <a href="../../index.html" class="nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i> تسجيل الخروج</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="mb-4">
            <h2 class="fw-bold">تحضير الطلاب</h2>
            <p class="text-muted">اختر المجموعة وسجل حضور اليوم</p>
        </header>

        <div class="card m-card p-4">
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label for="group-select" class="form-label">اختر المجموعة</label>
                    <select id="group-select" class="form-select">
                        <option>المجموعة أ</option>
                        <option>المجموعة ب</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="att-date" class="form-label">التاريخ</label>
                    <input type="date" id="att-date" class="form-control" value="2024-05-01">
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered align-middle text-center">
                    <thead class="table-light">
                        <tr>
                            <th>اسم الطالب</th>
                            <th>حاضر</th>
                            <th>غائب</th>
                            <th>بعذر</th>
                            <th>ملاحظات</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>ياسين محمد</td>
                            <td><input type="radio" name="att1" title="حاضر" checked></td>
                            <td><input type="radio" name="att1" title="غائب"></td>
                            <td><input type="radio" name="att1" title="بعذر"></td>
                            <td><input type="text" class="form-control form-control-sm" title="ملاحظات" placeholder="ملاحظات..."></td>
                        </tr>
                        <tr>
                            <td>ليلى أحمد</td>
                            <td><input type="radio" name="att2" title="حاضر" checked></td>
                            <td><input type="radio" name="att2" title="غائب"></td>
                            <td><input type="radio" name="att2" title="بعذر"></td>
                            <td><input type="text" class="form-control form-control-sm" title="ملاحظات" placeholder="ملاحظات..."></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="mt-4 text-end">
                <button id="save-attendance-btn" class="btn btn-success px-5">حفظ التحضير</button>
            </div>
        </div>
    </main>

    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/main.js"></script>
</body>
</html>
