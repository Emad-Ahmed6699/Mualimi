<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة المجموعات - معلمي</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="fade-in">

    <!-- Mobile Toggle Button -->
    <button class="mobile-toggle" title="تبديل القائمة">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">معلمي</h3>
            <span class="badge bg-primary">لوحة الإدارة</span>
        </div>
        <div class="nav flex-column">
            <a href="dashboard.html" class="nav-link"><i class="fas fa-home me-2"></i> الرئيسة</a>
            <a href="groups.html" class="nav-link active"><i class="fas fa-users me-2"></i> المجموعات</a>
            <a href="quiz-creator.html" class="nav-link"><i class="fas fa-plus-circle me-2"></i> منشئ الاختبارات</a>
            <a href="reports.html" class="nav-link"><i class="fas fa-chart-bar me-2"></i> التقارير والنتائج</a>
            <hr>
            <a href="javascript:void(0)" onclick="logout()" class="nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i> تسجيل الخروج</a>
        </div>
    </nav>

    <main class="main-content">
        <header class="mb-4">
            <h2 class="fw-bold">إدارة المجموعات</h2>
            <p class="text-muted">قم بإضافة وتعديل المجموعات الدراسية والطلاب</p>
        </header>

        <div class="card m-card p-4 mb-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
                <h5 class="fw-bold mb-0">قائمة المجموعات</h5>
                <div class="d-flex gap-2 flex-grow-1 max-width-400">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fas fa-search text-muted"></i></span>
                        <input type="text" id="search-groups" class="form-control border-start-0" placeholder="ابحث عن مجموعة...">
                    </div>
                    <button class="btn btn-primary text-nowrap" data-bs-toggle="modal" data-bs-target="#addGroupModal">إضافة مجموعة</button>
                </div>
            </div>
            <div id="groups-container" class="row g-4">
                <!-- المجموعات تظهر هنا ديناميكياً بواسطة JavaScript -->
            </div>
        </div>
    </main>

    <!-- Add Group Modal -->
    <div class="modal fade" id="addGroupModal" tabindex="-1" aria-labelledby="addGroupModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="addGroupModalLabel">إضافة مجموعة جديدة</h5>
                    <button type="button" class="btn-close ms-0 me-auto" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="add-group-form">
                        <div class="mb-3">
                            <label for="groupName" class="form-label">اسم المجموعة</label>
                            <input type="text" class="form-control" id="groupName" placeholder="مثلاً: المجموعة ج" required>
                        </div>
                        <div class="mb-3">
                            <label for="courseName" class="form-label">المادة الدراسية</label>
                            <input type="text" class="form-control" id="courseName" placeholder="مثلاً: لغة إنجليزية" required>
                        </div>
                        <div class="mb-3">
                            <label for="groupGrade" class="form-label">الصف الدراسي</label>
                            <select class="form-select" id="groupGrade" required>
                                <option value="" selected disabled>اختر الصف...</option>
                                <option value="1">الصف الأول</option>
                                <option value="2">الصف الثاني</option>
                                <option value="3">الصف الثالث</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="studentCount" class="form-label">عدد الطلاب المتوقع</label>
                            <input type="number" class="form-control" id="studentCount" placeholder="0">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="button" class="btn btn-primary" id="save-group-btn">حفظ المجموعة</button>
                </div>
            </div>
        </div>
    </div>

    <!-- View Students Modal -->
    <div class="modal fade" id="viewStudentsModal" tabindex="-1" aria-labelledby="viewStudentsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="viewStudentsModalLabel">قائمة طلاب المجموعة</h5>
                    <button type="button" class="btn-close ms-0 me-auto" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="table-responsive mb-4">
                        <table class="table table-hover align-middle">
                            <thead>
                                <tr>
                                    <th>اسم الطالب</th>
                                    <th>ID</th>
                                    <th>البريد الإلكتروني</th>
                                    <th>الإجراءات</th>
                                </tr>
                            </thead>
                            <tbody id="group-students-body">
                                <!-- سيتم جلب الطلاب هنا -->
                            </tbody>
                        </table>
                    </div>
                    
                    <hr>
                    <h6 class="fw-bold mb-3">إضافة طالب جديد للمجموعة</h6>
                    <form id="add-student-to-group-form">
                        <div class="row g-2">
                            <div class="col-md-6">
                                <input type="text" id="new-student-name" class="form-control form-control-sm" placeholder="اسم الطالب الرباعي" required>
                            </div>
                            <div class="col-md-6">
                                <input type="text" id="new-student-id" class="form-control form-control-sm" placeholder="كود الطالب (ID)" required>
                            </div>
                            <div class="col-md-6">
                                <input type="email" id="new-student-email" class="form-control form-control-sm" placeholder="البريد الإلكتروني" required>
                            </div>
                            <div class="col-md-3">
                                <input type="number" id="new-student-age" class="form-control form-control-sm" placeholder="السن" required>
                            </div>
                            <div class="col-md-3">
                                <button type="button" id="save-student-btn" class="btn btn-primary btn-sm w-100">إضافة</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../../assets/js/api.js"></script>
    <script src="../../assets/js/main.js"></script>
</body>
</html>
