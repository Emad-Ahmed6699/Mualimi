<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - معلمي</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Outfit', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            border: none;
        }
        .login-header {
            background: #fff;
            padding: 30px;
            text-align: center;
        }
        .login-body {
            padding: 40px;
        }
        .nav-pills .nav-link {
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: 600;
            color: #666;
        }
        .nav-pills .nav-link.active {
            background-color: var(--primary-color);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #eee;
            background: #f9f9f9;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(102, 126, 234, 0.1);
            border-color: #667eea;
        }
        .btn-login {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            color: #fff;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
            color: #fff;
        }
    </style>
</head>
<body class="fade-in">

    <div class="login-card">
        <div class="login-header">
            <h1 class="fw-bold text-primary mb-1">معلمي</h1>
            <p class="text-muted small">مرحباً بك في بوابتك التعليمية الذكية</p>
        </div>
        
        <div class="login-body">
            <ul class="nav nav-pills nav-justified mb-4" id="login-tabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="teacher-tab" data-bs-toggle="pill" data-bs-target="#teacher-login" type="button" role="tab">معلم</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="student-tab" data-bs-toggle="pill" data-bs-target="#student-login" type="button" role="tab">طالب</button>
                </li>
            </ul>

            <div class="tab-content">
                <!-- Teacher Login -->
                <div class="tab-pane fade show active" id="teacher-login">
                    <form id="teacher-login-form">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">البريد الإلكتروني</label>
                            <input type="email" class="form-control" id="teacher-email" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">كلمة المرور</label>
                            <input type="password" class="form-control" id="teacher-password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-login w-100">تسجيل الدخول كمعلم</button>
                    </form>
                </div>

                <!-- Student Login -->
                <div class="tab-pane fade" id="student-login">
                    <form id="student-login-form">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">كود الطالب (ID)</label>
                            <input type="text" class="form-control" id="student-login-id" placeholder="اكتب كود الطالب هنا..." required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">كلمة المرور</label>
                            <input type="password" class="form-control" id="student-password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-login w-100">تسجيل الدخول كطالب</button>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4">
                <p class="text-muted small">ليس لديك حساب؟ <a href="signup.html" class="text-primary fw-bold text-decoration-none">إنشاء حساب جديد</a></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Handle Teacher Login
            document.getElementById('teacher-login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('teacher-email').value;
                const password = document.getElementById('teacher-password').value;

                try {
                    const response = await api.request('/auth/teacher/login', {
                        method: 'POST',
                        body: JSON.stringify({ email, password })
                    });
                    
                    if (response.success) {
                        localStorage.setItem('mualimi_role', 'teacher');
                        localStorage.setItem('mualimi_user_id', response.data._id);
                        localStorage.setItem('mualimi_user_name', response.data.name);
                        showNotification('تم تسجيل الدخول بنجاح');
                        setTimeout(() => window.location.href = 'teacher-dashboard.html', 1000);
                    }
                } catch (error) {
                    showNotification(error.message, 'error');
                }
            });

            // Handle Student Login
            document.getElementById('student-login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const studentId = document.getElementById('student-login-id').value;
                const password = document.getElementById('student-password').value;

                try {
                    const response = await api.request('/auth/student/login', {
                        method: 'POST',
                        body: JSON.stringify({ studentId, password })
                    });
                    
                    if (response.success) {
                        localStorage.setItem('mualimi_role', 'student');
                        localStorage.setItem('mualimi_student_id', response.data._id);
                        localStorage.setItem('mualimi_student_name', response.data.name);
                        showNotification('تم تسجيل الدخول بنجاح');
                        setTimeout(() => window.location.href = 'student-dashboard.html', 1000);
                    }
                } catch (error) {
                    showNotification(error.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
