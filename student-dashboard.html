<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الطالب - معلمي</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            padding-bottom: 80px; /* Space for bottom nav */
        }
        .student-header {
            background-color: #fff;
            padding: 20px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .action-card {
            padding: 30px 20px;
            text-align: center;
            border: none;
            border-radius: 20px;
            color: #fff;
            margin-bottom: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .action-card:active {
            transform: scale(0.95);
        }
        .bg-quiz { background: linear-gradient(45deg, #3498db, #2980b9); }
        .bg-grades { background: linear-gradient(45deg, #2ecc71, #27ae60); }
        .bg-attendance { background: linear-gradient(45deg, #f1c40f, #f39c12); }
        
        .action-card i {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        .action-card h3 {
            font-weight: 700;
            margin-bottom: 5px;
        }
    </style>
</head>
<body class="fade-in">

    <!-- Top Header -->
    <header class="student-header d-flex justify-content-between align-items-center">
        <div>
            <h4 class="fw-bold mb-0">مرحباً، عمده</h4>
            <small class="text-muted">الصف العاشر - المجموعة أ</small>
        </div>
        <img src="https://ui-avatars.com/api/?name=Omda&background=3498db&color=fff" class="rounded-circle" width="45" alt="Student">
    </header>

    <div class="container">
        <!-- Main Actions -->
        <div class="row">
            <div class="col-12">
                <div class="card action-card bg-quiz" onclick="window.location.href='pages/student/quizzes.html'">
                    <i class="fas fa-file-signature"></i>
                    <h3>الاختبارات النشطة</h3>
                    <p class="mb-0" id="active-quizzes-count">لديك 2 اختبار جديد</p>
                </div>
            </div>
            <div class="col-12">
                <div class="card action-card bg-grades" onclick="window.location.href='pages/student/grades.html'">
                    <i class="fas fa-award"></i>
                    <h3>نتائجي وتقدمي</h3>
                    <p class="mb-0">شاهد درجاتك الأخيرة</p>
                </div>
            </div>
            <div class="col-12">
                <div class="card action-card bg-attendance" onclick="window.location.href='pages/student/attendance.html'">
                    <i class="fas fa-calendar-check"></i>
                    <h3>سجل الحضور</h3>
                    <p class="mb-0">نسبة حضورك: 98%</p>
                </div>
            </div>
        </div>

        <!-- Recent Activity Simple List -->
        <div class="mt-4">
            <h5 class="fw-bold mb-3">آخر التنبيهات</h5>
            <div class="card m-card p-3 mb-2">
                <div class="d-flex align-items-center">
                    <div class="bg-light p-2 rounded me-3 text-primary">
                        <i class="fas fa-bell"></i>
                    </div>
                    <div>
                        <p class="mb-0 fw-bold">تم إضافة اختبار جديد</p>
                        <small class="text-muted">منذ ساعتين</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <i class="fas fa-home"></i>
            الرئيسة
        </a>
        <a href="pages/student/quizzes.html" class="nav-item">
            <i class="fas fa-book"></i>
            الاختبارات
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-comment-alt"></i>
            الرسائل
        </a>
        <a href="index.html" class="nav-item text-danger">
            <i class="fas fa-sign-out-alt"></i>
            خروج
        </a>
    </nav>

    <script src="assets/js/main.js"></script>
</body>
</html>
